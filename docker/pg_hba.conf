# PostgreSQL Client Authentication - Local Dev Override
# Changes Docker network connections (172.16/12) to trust for local testing.

# TYPE  DATABASE        USER            ADDRESS                 METHOD

# Local socket connections
local all  supabase_admin     scram-sha-256
local all  all                peer map=supabase_map

# Loopback
host  all  all  127.0.0.1/32  trust
host  all  all  ::1/128       trust

# Docker bridge network - trust for local dev (no passwords needed)
host  all  all  10.0.0.0/8     trust
host  all  all  172.16.0.0/12  trust
host  all  all  192.168.0.0/16 trust

# Everything else
host  all  all  0.0.0.0/0      scram-sha-256
host  all  all  ::0/0          scram-sha-256
